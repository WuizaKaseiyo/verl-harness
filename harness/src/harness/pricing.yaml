# Per-million-token USD estimates for common models. Users override or extend
# via `~/.verl-harness/pricing.yaml` (deep-merged on top of these defaults).
#
# Keys match the `model_id` portion of the `<provider>/<model_id>` spec.
# For OpenRouter (which prefixes models like `anthropic/claude-...`), match on
# the tail after the first `/`.
#
# Fields:
#   input     — per 1M input tokens
#   output    — per 1M output tokens
#   cache_read     — per 1M tokens READ from Anthropic prompt cache (10% of input)
#   cache_creation — per 1M tokens written to cache (125% of input)
# Unknown models → cost estimate omitted from the final summary.

version: 1

models:

  # ── Anthropic ─────────────────────────────────────────────
  claude-opus-4-8:
    input: 15.0
    output: 75.0
    cache_read: 1.50
    cache_creation: 18.75

  claude-opus-4-7:
    input: 15.0
    output: 75.0
    cache_read: 1.50
    cache_creation: 18.75

  claude-sonnet-4-6:
    input: 3.0
    output: 15.0
    cache_read: 0.30
    cache_creation: 3.75

  claude-haiku-4-5-20251001:
    input: 1.0
    output: 5.0
    cache_read: 0.10
    cache_creation: 1.25

  claude-haiku-4-5:
    input: 1.0
    output: 5.0
    cache_read: 0.10
    cache_creation: 1.25

  # ── OpenAI ────────────────────────────────────────────────
  gpt-5:
    input: 5.0
    output: 40.0

  gpt-5-mini:
    input: 0.25
    output: 2.0

  gpt-4o:
    input: 2.5
    output: 10.0

  gpt-4o-mini:
    input: 0.15
    output: 0.6

  # ── DeepSeek ──────────────────────────────────────────────
  deepseek-chat:
    input: 0.27
    output: 1.10

  # ── OpenRouter passes-through (model_id has provider prefix) ──
  # `anthropic/*` and `openai/*` on OpenRouter roughly track upstream pricing.
  # Non-anthropic/openai vendors need explicit `<vendor>/<model>` entries.

  z-ai/glm-5.2:
    input: 0.91
    output: 2.86
